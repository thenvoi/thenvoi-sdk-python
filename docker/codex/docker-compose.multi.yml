services:
  codex-darter:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: docker/codex/Dockerfile
    env_file:
      - ../../.env
    environment:
      CODEX_TRANSPORT: stdio
      CODEX_CWD: ${CODEX_DARTER_CWD:-/workspace/repo}
      CODEX_SANDBOX: ${CODEX_DARTER_SANDBOX:-external-sandbox}
      CODEX_AGENT_KEY: ${CODEX_DARTER_AGENT_KEY:-darter}
      CODEX_APPROVAL_MODE: manual
      CODEX_TURN_TASK_MARKERS: "false"
      PYTHONPATH: /workspace/repo/src
      THENVOI_REST_URL: ${THENVOI_REST_URL_DOCKER:-http://host.docker.internal:4000}
      THENVOI_WS_URL: ${THENVOI_WS_URL_DOCKER:-ws://host.docker.internal:4000/api/v1/socket/websocket}
      THENVOI_CLIENT_REST_WHEEL: ${THENVOI_CLIENT_REST_WHEEL:-}
      PHOENIX_CHANNELS_CLIENT_WHEEL: ${PHOENIX_CHANNELS_CLIENT_WHEEL:-}
    volumes:
      - ../../agent_config.yaml:/app/agent_config.yaml:ro
      - ../../:/workspace/repo
      - ${HOME}/.codex:/home/codex/.codex
      - ${HOME}/.config/gh:/home/codex/.config/gh
      - ${HOME}/.ssh:/home/codex/.ssh:ro
      - ${HOME}/.gitconfig:/home/codex/.gitconfig:ro
      - ${THENVOI_CLIENT_REST_WHEEL_DIR:-/tmp/thenvoi-client-rest}:/opt/thenvoi-client-rest:ro
      - ${PHOENIX_CHANNELS_CLIENT_WHEEL_DIR:-/tmp/phoenix-client}:/opt/phoenix-client:ro
      - codex_state:/state
      - codex_prompts:/prompts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /workspace/repo
    command:
      - /app/.venv/bin/python
      - examples/run_agent.py
      - --example
      - codex
      - --agent
      - ${CODEX_DARTER_AGENT_KEY:-darter}
      - --codex-role
      - coding
      - --codex-transport
      - ${CODEX_TRANSPORT:-stdio}
      - --codex-cwd
      - ${CODEX_DARTER_CWD:-/workspace/repo}
      - --codex-sandbox
      - ${CODEX_DARTER_SANDBOX:-external-sandbox}
      - --no-codex-turn-task-markers
    stdin_open: true
    tty: true

  codex-reviewer:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: docker/codex/Dockerfile
    env_file:
      - ../../.env
    environment:
      CODEX_TRANSPORT: stdio
      CODEX_CWD: ${CODEX_REVIEWER_CWD:-/workspace/repo}
      CODEX_SANDBOX: ${CODEX_REVIEWER_SANDBOX:-external-sandbox}
      CODEX_AGENT_KEY: ${CODEX_REVIEWER_AGENT_KEY:-reviewer}
      CODEX_APPROVAL_MODE: manual
      CODEX_TURN_TASK_MARKERS: "false"
      PYTHONPATH: /workspace/repo/src
      THENVOI_REST_URL: ${THENVOI_REST_URL_DOCKER:-http://host.docker.internal:4000}
      THENVOI_WS_URL: ${THENVOI_WS_URL_DOCKER:-ws://host.docker.internal:4000/api/v1/socket/websocket}
      THENVOI_CLIENT_REST_WHEEL: ${THENVOI_CLIENT_REST_WHEEL:-}
      PHOENIX_CHANNELS_CLIENT_WHEEL: ${PHOENIX_CHANNELS_CLIENT_WHEEL:-}
    volumes:
      - ../../agent_config.yaml:/app/agent_config.yaml:ro
      - ../../:/workspace/repo
      - ${HOME}/.codex:/home/codex/.codex
      - ${HOME}/.config/gh:/home/codex/.config/gh
      - ${HOME}/.ssh:/home/codex/.ssh:ro
      - ${HOME}/.gitconfig:/home/codex/.gitconfig:ro
      - ${THENVOI_CLIENT_REST_WHEEL_DIR:-/tmp/thenvoi-client-rest}:/opt/thenvoi-client-rest:ro
      - ${PHOENIX_CHANNELS_CLIENT_WHEEL_DIR:-/tmp/phoenix-client}:/opt/phoenix-client:ro
      - codex_state:/state
      - codex_prompts:/prompts
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /workspace/repo
    command:
      - /app/.venv/bin/python
      - examples/run_agent.py
      - --example
      - codex
      - --agent
      - ${CODEX_REVIEWER_AGENT_KEY:-reviewer}
      - --codex-role
      - reviewer
      - --codex-transport
      - ${CODEX_TRANSPORT:-stdio}
      - --codex-cwd
      - ${CODEX_REVIEWER_CWD:-/workspace/repo}
      - --codex-sandbox
      - ${CODEX_REVIEWER_SANDBOX:-external-sandbox}
      - --no-codex-turn-task-markers
    stdin_open: true
    tty: true

volumes:
  codex_state:
  codex_prompts:
