services:
  # Self-hosted Letta server.
  letta-server:
    image: letta/letta:latest
    restart: unless-stopped
    ports:
      - "8283:8283"
    volumes:
      - letta_data:/root/.letta
    environment:
      # Configure Letta's LLM provider.
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}

  # thenvoi-mcp server — provides Thenvoi platform tools to Letta via MCP.
  thenvoi-mcp:
    image: ghcr.io/thenvoi/thenvoi-mcp:latest
    restart: unless-stopped
    ports:
      - "8002:8002"
    environment:
      THENVOI_REST_URL: ${THENVOI_REST_URL:-https://app.thenvoi.com}
      THENVOI_API_KEY: ${THENVOI_API_KEY:-}
      MCP_PORT: "8002"

  # Letta adapter — connects Thenvoi platform to Letta agent.
  agent:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: docker/letta/Dockerfile
    env_file:
      - ../../.env
    environment:
      AGENT_CONFIG: /app/agent_config.yaml
      AGENT_KEY: ${LETTA_AGENT_KEY:-agent}
      LETTA_BASE_URL: http://letta-server:8283
      LETTA_MODE: ${LETTA_MODE:-per_room}
      LETTA_MODEL: ${LETTA_MODEL:-}
      MCP_SERVER_URL: http://thenvoi-mcp:8002/sse
      MCP_SERVER_NAME: thenvoi
      # Container must reach host Thenvoi services via host.docker.internal (not localhost).
      THENVOI_REST_URL: ${THENVOI_REST_URL_DOCKER:-http://host.docker.internal:4000}
      THENVOI_WS_URL: ${THENVOI_WS_URL_DOCKER:-ws://host.docker.internal:4000/api/v1/socket/websocket}
    volumes:
      - ../../agent_config.yaml:/app/agent_config.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - letta-server
      - thenvoi-mcp

# Named volumes persist after `docker compose down`.
# Use `docker compose down -v` to remove them.
volumes:
  letta_data:
