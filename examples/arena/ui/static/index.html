<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>20 Questions Arena</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            thinker: '#8B5CF6',
            arena: { 900: '#0B1120', 800: '#131B2E', 700: '#1A253D' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { background: linear-gradient(145deg, #0B1120 0%, #0F172A 50%, #1A1040 100%); }
    .gradient-text {
      background: linear-gradient(135deg, #8B5CF6, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(16px); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse-ring { 0% { box-shadow: 0 0 0 0 rgba(139,92,246,0.4); } 70% { box-shadow: 0 0 0 10px rgba(139,92,246,0); } }
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    .fade-up { animation: fadeUp 0.35s ease-out both; }
    .pulse-ring { animation: pulse-ring 2s infinite; }
    .spin-slow { animation: spin-slow 1.5s linear infinite; }
    .msg-enter { animation: fadeUp 0.25s ease-out both; }
    select, input { color-scheme: dark; }
    .chat-scroll::-webkit-scrollbar { width: 6px; }
    .chat-scroll::-webkit-scrollbar-track { background: transparent; }
    .chat-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    /* Chat message styles */
    .chat-bubble { border-radius: 16px; }
    .chat-bubble-thinker {
      background: rgba(139, 92, 246, 0.08);
      border: 1px solid rgba(139, 92, 246, 0.18);
      border-radius: 16px;
    }
    .chat-bubble-user {
      background: rgba(99, 102, 241, 0.15);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 16px 4px 16px 16px;
    }
    .chat-bubble-agent {
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(51, 65, 85, 0.4);
      border-radius: 4px 16px 16px 16px;
    }
    .chat-bubble-thought {
      background: rgba(30, 41, 59, 0.3);
      border: 1px dashed rgba(100, 116, 139, 0.3);
      border-radius: 12px;
    }
    .chat-bubble-internal {
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(51, 65, 85, 0.25);
      border-radius: 8px;
    }
    .empty-state-pulse {
      animation: pulse-ring 3s infinite;
    }
    .msg-separator { border-top: 1px solid rgba(51, 65, 85, 0.3); }
  </style>
</head>
<body class="text-white min-h-screen font-sans">

<!-- ════════════ SETUP SCREEN ════════════ -->
<div id="setup-screen" class="min-h-screen flex items-center justify-center p-6">
  <div class="glass border border-slate-700/50 rounded-2xl shadow-2xl max-w-3xl w-full p-8 fade-up">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-extrabold gradient-text mb-2">20 Questions Arena</h1>
      <p class="text-slate-400 text-sm">AI models compete to guess the secret word</p>
    </div>

    <!-- API Key -->
    <div class="mb-6">
      <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Your API Key</label>
      <input id="api-key" type="password" placeholder="thnv_u_..."
        class="w-full bg-slate-800/80 border border-slate-600/50 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500/50 focus:border-violet-500 placeholder-slate-500 transition" />
    </div>

    <!-- Thinker -->
    <div class="mb-6">
      <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Game Master (Thinker)</label>
      <select id="thinker-model"
        class="w-full bg-slate-800/80 border border-slate-600/50 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-violet-500/50 transition">
      </select>
    </div>

    <!-- Guessers -->
    <div class="mb-8">
      <div class="flex items-center justify-between mb-3">
        <label class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Guessers</label>
        <button onclick="toggleAllGuessers()" class="text-xs text-violet-400 hover:text-violet-300 transition">Toggle All</button>
      </div>
      <div id="guesser-cards" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
    </div>

    <!-- Error -->
    <div id="setup-error" class="hidden mb-4 bg-red-500/10 border border-red-500/30 text-red-400 rounded-lg px-4 py-2.5 text-sm"></div>

    <!-- Start -->
    <button onclick="handleStart()"
      class="w-full bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 rounded-xl py-3 font-semibold text-sm transition-all hover:shadow-lg hover:shadow-violet-500/20 active:scale-[0.98]">
      Start Game
    </button>
  </div>
</div>

<!-- ════════════ LOADING SCREEN ════════════ -->
<div id="loading-screen" class="hidden min-h-screen flex items-center justify-center p-6">
  <div class="glass border border-slate-700/50 rounded-2xl shadow-2xl max-w-md w-full p-10 text-center fade-up">
    <div class="w-16 h-16 mx-auto mb-6 border-4 border-violet-500/30 border-t-violet-500 rounded-full spin-slow"></div>
    <h2 class="text-xl font-bold mb-2">Setting up the Arena</h2>
    <p id="loading-status" class="text-slate-400 text-sm">Starting agents...</p>
    <div class="mt-6 space-y-2" id="loading-steps"></div>
  </div>
</div>

<!-- ════════════ GAME SCREEN ════════════ -->
<div id="game-screen" class="hidden h-screen flex flex-col">
  <!-- Header bar -->
  <header class="shrink-0 glass border-b border-slate-700/50 px-4 py-2.5">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-3">
        <h1 class="text-sm font-bold gradient-text">20 Questions Arena</h1>
        <span id="poll-status" class="flex items-center gap-1.5 text-xs text-emerald-400">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-ring"></span>
          <span id="poll-status-text">Connecting...</span>
        </span>
      </div>
      <div class="flex items-center gap-3">
        <span id="msg-counter" class="text-[10px] text-slate-500 tabular-nums"></span>
        <button onclick="handleStop()"
          class="px-3 py-1.5 bg-slate-800 hover:bg-red-500/20 border border-slate-600/50 hover:border-red-500/50 rounded-lg text-xs text-slate-300 hover:text-red-400 transition">
          Stop Game
        </button>
      </div>
    </div>
    <!-- Guesser chips row -->
    <div id="guesser-chips" class="flex flex-wrap gap-2 mt-2"></div>
  </header>

  <!-- Chat area -->
  <div class="flex-1 overflow-y-auto chat-scroll px-4 py-3" id="chat-messages">
    <!-- Empty state (shown when no messages yet) -->
    <div id="chat-empty-state" class="flex flex-col items-center justify-center h-full text-center">
      <div class="w-12 h-12 rounded-full border-2 border-violet-500/30 flex items-center justify-center mb-4 empty-state-pulse">
        <svg class="w-6 h-6 text-violet-400/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
        </svg>
      </div>
      <p class="text-slate-400 text-sm font-medium mb-1">Waiting for messages...</p>
      <p class="text-slate-600 text-xs">The game master is setting up the round</p>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="shrink-0 glass border-t border-slate-700/50 px-4 py-2 flex items-center gap-4">
    <label class="flex items-center gap-2 cursor-pointer select-none">
      <input type="checkbox" id="show-thoughts" class="accent-violet-500 w-3.5 h-3.5" onchange="toggleFilter()">
      <span class="text-xs text-slate-500">Thoughts</span>
    </label>
    <label class="flex items-center gap-2 cursor-pointer select-none">
      <input type="checkbox" id="show-internal" class="accent-violet-500 w-3.5 h-3.5" onchange="toggleFilter()">
      <span class="text-xs text-slate-500">Internal events</span>
    </label>
    <div class="flex-1"></div>
    <span id="thinker-label" class="text-[10px] text-slate-600">Thinker: <span id="thinker-model-label"></span></span>
  </div>
</div>

<!-- ════════════ WINNER MODAL ════════════ -->
<div id="winner-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
  <div class="glass border border-slate-700/50 rounded-2xl shadow-2xl max-w-lg w-full p-8 fade-up text-center max-h-[90vh] overflow-y-auto chat-scroll">
    <div class="text-5xl mb-4">&#127942;</div>
    <h2 class="text-2xl font-extrabold mb-1">Game Over!</h2>
    <p id="winner-word" class="text-slate-400 mb-6"></p>
    <div id="winner-results" class="space-y-2 mb-6 text-left"></div>

    <!-- Analysis section (hidden until requested) -->
    <div id="analysis-section" class="hidden mb-6">
      <div id="analysis-loading" class="hidden py-6">
        <div class="w-10 h-10 mx-auto mb-3 border-[3px] border-violet-500/30 border-t-violet-500 rounded-full spin-slow"></div>
        <p class="text-slate-400 text-sm">Analyzing gameplay...</p>
      </div>
      <div id="analysis-content" class="hidden text-left">
        <div class="border-t border-slate-700/50 pt-4 mb-3">
          <h3 class="text-sm font-bold text-violet-400 uppercase tracking-wider mb-3">Game Analysis</h3>
        </div>
        <div id="analysis-text" class="text-sm text-slate-300 leading-relaxed space-y-2"></div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3">
      <button onclick="handleAnalyze()" id="analyze-btn"
        class="flex-1 bg-slate-800 hover:bg-slate-700 border border-violet-500/30 hover:border-violet-500/50 rounded-xl py-3 font-semibold text-sm text-violet-300 transition-all">
        Analyze Game
      </button>
      <button onclick="handleNewGame()"
        class="flex-1 bg-gradient-to-r from-violet-600 to-blue-600 hover:from-violet-500 hover:to-blue-500 rounded-xl py-3 font-semibold text-sm transition-all">
        New Game
      </button>
    </div>
    <button onclick="handleViewGame()" id="view-game-btn"
      class="hidden w-full mt-3 bg-slate-800/60 hover:bg-slate-700/60 border border-slate-600/40 rounded-xl py-2.5 font-medium text-xs text-slate-400 hover:text-slate-300 transition-all">
      View Game Messages
    </button>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
const state = {
  config: null,
  gameId: null,
  guessers: [],
  thinkerModel: '',
  messages: [],          // all displayed messages
  seenIds: new Set(),    // track which message IDs we've rendered
  pollTimer: null,
  showThoughts: false,
  showInternal: false,
  thinkerAgentId: '',
  pollCount: 0,
  gameEnded: false,
};

const MEDALS = ['&#129351;', '&#129352;', '&#129353;', ''];

// ── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  const resp = await fetch('/api/config');
  state.config = await resp.json();
  state.thinkerAgentId = state.config.thinker_agent_id;

  const saved = localStorage.getItem('arena_api_key');
  if (saved) document.getElementById('api-key').value = saved;

  renderSetupForm();

  // Resume active game
  const cur = await fetch('/api/game/current').then(r => r.json());
  if (cur.active) {
    state.gameId = cur.game_id;
    state.guessers = cur.guessers;
    state.thinkerModel = cur.thinker_model;
    enterGameScreen();
  }
}

// ── Setup form ───────────────────────────────────────────────────────────────
function renderSetupForm() {
  const { models, guessers, thinker_default_model } = state.config;

  const tSelect = document.getElementById('thinker-model');
  tSelect.innerHTML = buildModelOptions(models, thinker_default_model);

  const container = document.getElementById('guesser-cards');
  container.innerHTML = guessers.map((g, i) => `
    <label class="guesser-card flex items-start gap-3 p-3.5 rounded-xl border cursor-pointer transition-all
                  ${i < 3 ? 'bg-slate-800/60 border-slate-600/40' : 'bg-slate-800/30 border-slate-700/30 opacity-60'}"
           style="border-left: 3px solid ${g.color}"
           data-key="${g.key}">
      <input type="checkbox" class="guesser-check mt-0.5 accent-violet-500" value="${g.key}" ${i < 3 ? 'checked' : ''}
        onchange="updateGuesserCard(this)">
      <div class="flex-1 min-w-0">
        <div class="font-semibold text-sm mb-1.5" style="color:${g.color}">${g.label}</div>
        <select class="guesser-model w-full bg-slate-700/60 border border-slate-600/40 rounded-md px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-violet-500/50 transition">
          ${buildModelOptions(models, g.default_model)}
        </select>
      </div>
    </label>
  `).join('');
}

function buildModelOptions(models, selected) {
  const grouped = {};
  models.forEach(m => {
    if (!grouped[m.provider]) grouped[m.provider] = [];
    grouped[m.provider].push(m);
  });
  return Object.entries(grouped).map(([provider, items]) =>
    `<optgroup label="${provider}">` +
    items.map(m => `<option value="${m.id}" ${m.id === selected ? 'selected' : ''}>${m.name}</option>`).join('') +
    `</optgroup>`
  ).join('');
}

function updateGuesserCard(checkbox) {
  const card = checkbox.closest('.guesser-card');
  if (checkbox.checked) {
    card.classList.remove('opacity-60', 'bg-slate-800/30', 'border-slate-700/30');
    card.classList.add('bg-slate-800/60', 'border-slate-600/40');
  } else {
    card.classList.add('opacity-60', 'bg-slate-800/30', 'border-slate-700/30');
    card.classList.remove('bg-slate-800/60', 'border-slate-600/40');
  }
}

function toggleAllGuessers() {
  const boxes = document.querySelectorAll('.guesser-check');
  const allChecked = [...boxes].every(b => b.checked);
  boxes.forEach(b => { b.checked = !allChecked; updateGuesserCard(b); });
}

// ── Start game ───────────────────────────────────────────────────────────────
async function handleStart() {
  const apiKey = document.getElementById('api-key').value.trim();
  if (!apiKey) return showSetupError('Please enter your API key');

  const checks = document.querySelectorAll('.guesser-check:checked');
  if (checks.length === 0) return showSetupError('Select at least one guesser');

  localStorage.setItem('arena_api_key', apiKey);
  hideSetupError();

  const guessers = [...checks].map(cb => {
    const card = cb.closest('.guesser-card');
    return { key: cb.value, model: card.querySelector('.guesser-model').value };
  });
  const thinkerModel = document.getElementById('thinker-model').value;

  showScreen('loading');
  animateLoadingSteps();

  try {
    const resp = await fetch('/api/game/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_api_key: apiKey, thinker_model: thinkerModel, guessers }),
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Failed to start game');

    state.gameId = data.game_id;
    state.guessers = data.guessers;
    state.thinkerModel = data.thinker_model;
    state.messages = [];
    state.seenIds = new Set();
    state.pollCount = 0;
    state.gameEnded = false;

    enterGameScreen();
  } catch (e) {
    showScreen('setup');
    showSetupError(e.message);
  }
}

function showSetupError(msg) {
  const el = document.getElementById('setup-error');
  el.textContent = msg;
  el.classList.remove('hidden');
}
function hideSetupError() { document.getElementById('setup-error').classList.add('hidden'); }

// ── Loading animation ────────────────────────────────────────────────────────
function animateLoadingSteps() {
  const steps = [
    'Starting Thinker agent...',
    'Starting Guesser agents...',
    'Waiting for connections...',
    'Creating game room...',
    'Sending start message...',
  ];
  const container = document.getElementById('loading-steps');
  container.innerHTML = steps.map(s =>
    `<div class="flex items-center gap-2 text-xs text-slate-500"><span class="step-icon w-4 text-center">&#9711;</span>${s}</div>`
  ).join('');
  const items = container.children;
  const statusEl = document.getElementById('loading-status');
  let i = 0;
  const timer = setInterval(() => {
    if (i >= items.length) { clearInterval(timer); return; }
    if (i > 0) {
      items[i-1].querySelector('.step-icon').innerHTML = '&#10003;';
      items[i-1].classList.replace('text-slate-500', 'text-emerald-400');
    }
    items[i].classList.replace('text-slate-500', 'text-violet-400');
    statusEl.textContent = steps[i];
    i++;
  }, 1800);
}

// ── Enter game screen ────────────────────────────────────────────────────────
function enterGameScreen() {
  showScreen('game');
  // Reset chat area with empty state
  const chatEl = document.getElementById('chat-messages');
  chatEl.innerHTML = `
    <div id="chat-empty-state" class="flex flex-col items-center justify-center h-full text-center">
      <div class="w-12 h-12 rounded-full border-2 border-violet-500/30 flex items-center justify-center mb-4 empty-state-pulse">
        <svg class="w-6 h-6 text-violet-400/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M8.625 12a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H8.25m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0H12m4.125 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 01-2.555-.337A5.972 5.972 0 015.41 20.97a5.969 5.969 0 01-.474-.065 4.48 4.48 0 00.978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z" />
        </svg>
      </div>
      <p class="text-slate-400 text-sm font-medium mb-1">Waiting for messages...</p>
      <p class="text-slate-600 text-xs">The game master is setting up the round</p>
    </div>`;
  document.getElementById('thinker-model-label').textContent = state.thinkerModel || 'Auto';
  renderGuesserChips();
  startPolling();
}

function renderGuesserChips() {
  const el = document.getElementById('guesser-chips');
  el.innerHTML = state.guessers.map(g => `
    <div class="flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-medium border"
         style="border-color:${g.color}40; color:${g.color}; background:${g.color}10"
         id="chip-${g.agent_id}">
      <span class="w-1.5 h-1.5 rounded-full" style="background:${g.color}"></span>
      ${g.label}
      <span class="chip-status text-[9px] opacity-60">--</span>
    </div>
  `).join('');
}

// ── REST Polling (replaces broken SSE) ───────────────────────────────────────
function startPolling() {
  stopPolling();
  pollMessages(); // first poll immediately
  state.pollTimer = setInterval(pollMessages, 2500);
}

function stopPolling() {
  if (state.pollTimer) { clearInterval(state.pollTimer); state.pollTimer = null; }
}

async function pollMessages() {
  if (!state.gameId) return;
  try {
    const url = `/api/game/${state.gameId}/messages`;
    console.log(`[Arena] poll #${state.pollCount + 1} -> ${url}`);
    const resp = await fetch(url);
    if (!resp.ok) {
      console.error(`[Arena] poll failed: HTTP ${resp.status}`);
      setPollStatus('error');
      return;
    }
    const data = await resp.json();
    const messages = data.messages || [];

    state.pollCount++;
    console.log(`[Arena] poll #${state.pollCount}: ${messages.length} total messages, ${state.seenIds.size} seen`);

    // Log first message structure on first successful poll with data
    if (state.pollCount === 1 && messages.length > 0) {
      console.log('[Arena] first message sample:', JSON.stringify(messages[0]));
      console.log('[Arena] first message keys:', Object.keys(messages[0]));
    }

    setPollStatus('live', messages.length);

    // Hide empty state once we have messages
    if (messages.length > 0) {
      const emptyState = document.getElementById('chat-empty-state');
      if (emptyState) emptyState.style.display = 'none';
    }

    // Find new messages and detect updates to existing ones
    let newCount = 0;
    for (const msg of messages) {
      if (!msg.id) {
        console.warn('[Arena] message missing id:', msg);
        continue;
      }
      if (state.seenIds.has(msg.id)) {
        // Check if message_type changed (e.g. text → thought)
        const existing = state.messages.find(m => m.id === msg.id);
        if (existing && existing.message_type !== msg.message_type) {
          console.log(`[Arena] message ${msg.id} type changed: ${existing.message_type} → ${msg.message_type}`);
          existing.message_type = msg.message_type;
          existing.content = msg.content;
          // Re-render: remove old DOM node and create new one
          const oldNode = document.querySelector(`[data-msg-id="${msg.id}"]`);
          if (oldNode) oldNode.remove();
          renderMessage(existing);
          newCount++;
        }
        continue;
      }
      state.seenIds.add(msg.id);
      state.messages.push(msg);
      renderMessage(msg);
      newCount++;
    }

    if (newCount > 0) {
      console.log(`[Arena] rendered ${newCount} new messages`);
      scrollChat();
      updateChips();
      // Check for game end on every new message
      for (const msg of messages) {
        if (!msg._endChecked) {
          msg._endChecked = true;
          checkGameEnd(msg);
        }
      }
    }
  } catch (e) {
    console.error('[Arena] poll error:', e);
    setPollStatus('error');
  }
}

function setPollStatus(status, count) {
  const dot = document.querySelector('#poll-status span');
  const text = document.getElementById('poll-status-text');
  const counter = document.getElementById('msg-counter');
  if (status === 'live') {
    dot.className = 'w-1.5 h-1.5 rounded-full bg-emerald-400 pulse-ring';
    text.textContent = 'Live';
    text.className = 'text-emerald-400';
    if (count !== undefined) counter.textContent = `${count} messages`;
  } else {
    dot.className = 'w-1.5 h-1.5 rounded-full bg-amber-400';
    text.textContent = 'Reconnecting...';
    text.className = 'text-amber-400';
  }
}

// ── Message rendering ────────────────────────────────────────────────────────
function renderMessage(msg) {
  const container = document.getElementById('chat-messages');
  const type = (msg.message_type || '').toLowerCase();
  const senderType = (msg.sender_type || '').toLowerCase();
  const isThought = type === 'thought';
  const isInternal = type === 'tool_call' || type === 'tool_result';
  const isUser = senderType === 'user' || senderType === 'human';
  const isThinker = msg.sender_id === state.thinkerAgentId;
  const info = getSenderInfo(msg);
  const time = formatTime(msg.inserted_at);
  const content = formatContent(msg.content, type);

  // If content is empty after formatting, show a placeholder instead of dropping
  const displayContent = content.trim() ? content : '<span class="text-slate-500 italic">@agent</span>';

  const div = document.createElement('div');
  div.dataset.msgId = msg.id;
  div.dataset.msgType = type;

  // Determine visibility
  const hidden = (isThought && !state.showThoughts) || (isInternal && !state.showInternal);

  if (isInternal) {
    // Compact internal event row
    div.className = `msg-enter internal-msg py-1 ${hidden ? 'hidden' : ''}`;
    div.innerHTML = `
      <div class="chat-bubble-internal px-3 py-1.5 mx-auto max-w-2xl">
        <div class="flex items-center gap-2 text-[10px] text-slate-500">
          <span class="font-mono px-1.5 py-0.5 rounded bg-slate-800/80 text-slate-500 text-[9px]">${type}</span>
          <span class="font-medium" style="color:${info.color}">${info.name}</span>
          <span class="truncate flex-1">${displayContent}</span>
          <span class="shrink-0 text-slate-600">${time}</span>
        </div>
      </div>`;
  } else if (isThought) {
    // Thought bubble -- italic, muted, centered
    div.className = `msg-enter thought-msg py-1 ${hidden ? 'hidden' : ''}`;
    div.innerHTML = `
      <div class="chat-bubble-thought px-4 py-2.5 max-w-2xl mx-auto">
        <div class="flex items-start gap-2.5">
          <div class="w-5 h-5 rounded-full flex items-center justify-center text-[8px] font-bold shrink-0 mt-0.5 border border-dashed"
               style="border-color:${info.color}50;color:${info.color}70">${info.initial}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-0.5">
              <span class="text-[10px] font-medium" style="color:${info.color}90">${info.name}</span>
              <span class="text-[9px] text-slate-600 italic">thinking</span>
              <span class="ml-auto text-[9px] text-slate-600">${time}</span>
            </div>
            <div class="text-xs text-slate-500 italic leading-relaxed">${displayContent}</div>
          </div>
        </div>
      </div>`;
  } else if (isUser) {
    // User message -- right aligned
    div.className = 'msg-enter py-1.5';
    div.innerHTML = `
      <div class="flex justify-end">
        <div class="max-w-lg">
          <div class="flex items-center justify-end gap-2 mb-1">
            <span class="text-[10px] text-slate-500">${time}</span>
            <span class="text-[11px] font-semibold text-indigo-300">${msg.sender_name || 'You'}</span>
          </div>
          <div class="chat-bubble-user px-4 py-2.5">
            <div class="text-sm text-slate-200 leading-relaxed">${displayContent}</div>
          </div>
        </div>
      </div>`;
  } else if (isThinker) {
    // Thinker (game master) message -- purple themed, right aligned
    div.className = 'msg-enter py-2';
    div.innerHTML = `
      <div class="flex justify-end">
        <div class="flex items-start gap-3 max-w-2xl flex-row-reverse">
          <div class="w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold shrink-0 shadow-lg shadow-violet-500/20"
               style="background: linear-gradient(135deg, #7C3AED, #8B5CF6); color: white;">${info.initial}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-2 mb-1 justify-end">
              <span class="text-[10px] text-slate-500">${time}</span>
              <span class="text-[9px] text-violet-400/60 font-medium uppercase tracking-wider">Game Master</span>
              <span class="font-bold text-sm" style="color: #A78BFA;">${info.name}</span>
            </div>
            <div class="chat-bubble-thinker px-4 py-3" style="border-radius: 16px 4px 16px 16px;">
              <div class="text-sm text-slate-200 leading-relaxed">${displayContent}</div>
            </div>
          </div>
        </div>
      </div>`;
  } else {
    // Guesser agent message -- left aligned with agent color
    div.className = 'msg-enter py-2';
    div.innerHTML = `
      <div class="flex items-start gap-3 max-w-2xl">
        <div class="w-9 h-9 rounded-full flex items-center justify-center text-xs font-bold shrink-0 shadow-lg"
             style="background:${info.color}; color: white;">${info.initial}</div>
        <div class="flex-1 min-w-0">
          <div class="flex items-baseline gap-2 mb-1">
            <span class="font-semibold text-sm" style="color:${info.color}">${info.name}</span>
            <span class="text-[10px] text-slate-500">${time}</span>
          </div>
          <div class="chat-bubble-agent px-4 py-3">
            <div class="text-sm text-slate-200 leading-relaxed">${displayContent}</div>
          </div>
        </div>
      </div>`;
  }

  container.appendChild(div);
}

function getSenderInfo(msg) {
  if (msg.sender_id === state.thinkerAgentId)
    return { name: msg.sender_name || 'Thinker', color: '#8B5CF6', initial: 'T' };
  const g = state.guessers.find(g => g.agent_id === msg.sender_id);
  if (g) return { name: msg.sender_name || g.label, color: g.color, initial: g.label.replace('Guesser ', 'G') };
  return { name: msg.sender_name || 'User', color: '#94A3B8', initial: 'U' };
}

function formatContent(text, type) {
  if (!text) return '';
  // For tool_call messages, try to extract a readable summary
  if (type === 'tool_call' || type === 'tool_result') {
    try {
      const parsed = JSON.parse(text);
      if (parsed.name) return `${parsed.name}()`;
      if (parsed.event && parsed.data) {
        const summary = parsed.data.content || parsed.data.message || parsed.name || '';
        return summary.slice(0, 80);
      }
    } catch {}
    return text.slice(0, 80);
  }
  // Strip @[[uuid]] mention format, but replace with agent name if possible
  let clean = text.replace(/@\[\[[\w-]+\]\]/g, (match) => {
    // Extract the UUID from @[[uuid]]
    const uuid = match.slice(3, -2);
    // Try to find the agent name
    if (uuid === state.thinkerAgentId) return '@Thinker';
    const g = state.guessers.find(g => g.agent_id === uuid);
    if (g) return `@${g.name || g.label}`;
    return '@agent';
  });
  // If after stripping mentions the content is only whitespace, return placeholder
  if (!clean.trim()) return '';
  // HTML escape
  clean = clean.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  // Bold
  clean = clean.replace(/\*\*(.+?)\*\*/g, '<strong class="text-white font-semibold">$1</strong>');
  // Newlines
  clean = clean.replace(/\n/g, '<br>');
  return clean.trim();
}

function formatTime(iso) {
  if (!iso) return '';
  try { return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
  catch { return ''; }
}

function scrollChat() {
  const el = document.getElementById('chat-messages');
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

function toggleFilter() {
  state.showThoughts = document.getElementById('show-thoughts').checked;
  state.showInternal = document.getElementById('show-internal').checked;
  document.querySelectorAll('.thought-msg').forEach(el => {
    el.classList.toggle('hidden', !state.showThoughts);
  });
  document.querySelectorAll('.internal-msg').forEach(el => {
    el.classList.toggle('hidden', !state.showInternal);
  });
  scrollChat();
}

// ── Guesser chips (inline scoreboard) ────────────────────────────────────────
function updateChips() {
  const scores = computeScores();
  for (const [agentId, data] of Object.entries(scores)) {
    const chip = document.getElementById(`chip-${agentId}`);
    if (!chip) continue;
    const statusEl = chip.querySelector('.chip-status');
    if (data.status === 'won') {
      statusEl.textContent = `Won in ${data.questions}!`;
      chip.style.background = `${chip.style.borderColor.replace('40', '30')}`;
    } else if (data.status === 'lost') {
      statusEl.textContent = 'Failed';
      statusEl.style.color = '#ef4444';
    } else if (data.questions > 0) {
      statusEl.textContent = `Q${data.questions}/20`;
    } else if (data.status === 'playing') {
      statusEl.textContent = 'Playing';
    }
  }
}

function computeScores() {
  const guesserIds = new Set(state.guessers.map(g => g.agent_id));
  const scores = {};
  state.guessers.forEach(g => { scores[g.agent_id] = { questions: 0, status: 'waiting' }; });

  // Only look at text messages for scoring
  const textMsgs = state.messages.filter(m => {
    const t = (m.message_type || '').toLowerCase();
    return t === 'text' || t === 'message' || t === '';
  });

  let lastGuesserId = null;
  for (const msg of textMsgs) {
    if (guesserIds.has(msg.sender_id)) {
      lastGuesserId = msg.sender_id;
      if (scores[msg.sender_id].status === 'waiting') scores[msg.sender_id].status = 'playing';
    } else if (msg.sender_id === state.thinkerAgentId && lastGuesserId) {
      const qMatch = msg.content.match(/question\s+(\d+)\s+of\s+20/i);
      if (qMatch) scores[lastGuesserId].questions = parseInt(qMatch[1]);

      if (/correct!.*got it in\s+(\d+)/i.test(msg.content)) {
        const wMatch = msg.content.match(/got it in\s+(\d+)/i);
        scores[lastGuesserId].status = 'won';
        if (wMatch) scores[lastGuesserId].questions = parseInt(wMatch[1]);
      }
      if (/game over!.*all 20 questions/i.test(msg.content)) {
        scores[lastGuesserId].status = 'lost';
        scores[lastGuesserId].questions = 20;
      }
      lastGuesserId = null;
    }
  }
  return scores;
}

function modelShortName(id) {
  const m = state.config?.models?.find(m => m.id === id);
  return m ? m.name : id;
}

// ── Game end detection ───────────────────────────────────────────────────────
function checkGameEnd(msg) {
  if (state.gameEnded) return;
  if (msg.sender_id !== state.thinkerAgentId) return;
  const wordMatch = (msg.content || '').match(/[Tt]he word was\s+\*?\*?([^*.\n!]+)\*?\*?/);
  if (!wordMatch) return;

  state.gameEnded = true;
  const word = wordMatch[1].trim();
  const scores = computeScores();

  const results = state.guessers.map(g => {
    const s = scores[g.agent_id] || { questions: 0, status: 'lost' };
    return { label: g.label, color: g.color, model: modelShortName(g.model), ...s };
  });
  results.sort((a, b) => {
    if (a.status === 'won' && b.status !== 'won') return -1;
    if (a.status !== 'won' && b.status === 'won') return 1;
    return a.questions - b.questions;
  });

  setTimeout(() => showWinner(word, results), 2000);
}

function showWinner(word, results) {
  resetAnalysis();
  document.getElementById('winner-word').innerHTML = `The word was <strong class="text-white text-lg">${word}</strong>`;
  const container = document.getElementById('winner-results');
  container.innerHTML = results.map((r, i) => {
    const medal = r.status === 'won' ? (MEDALS[i] || '&#10003;') : '&#10007;';
    const detail = r.status === 'won' ? `${r.questions} questions` : 'Did not guess';
    const cls = r.status === 'won' ? 'text-emerald-400' : 'text-slate-500';
    return `
      <div class="flex items-center gap-3 p-3 rounded-lg bg-slate-800/60 border border-slate-700/40">
        <span class="text-lg shrink-0">${medal}</span>
        <div class="flex-1">
          <div class="font-semibold text-sm" style="color:${r.color}">${r.label}</div>
          <div class="text-[10px] text-slate-500">${r.model}</div>
        </div>
        <span class="text-xs font-semibold ${cls}">${detail}</span>
      </div>`;
  }).join('');
  document.getElementById('winner-modal').classList.remove('hidden');
}

// ── Stop / New game ──────────────────────────────────────────────────────────
async function handleStop() {
  stopPolling();
  if (state.gameId) await fetch(`/api/game/${state.gameId}/stop`, { method: 'POST' });
  state.gameId = null;
  state.messages = [];
  state.seenIds = new Set();
  state.gameEnded = false;
  showScreen('setup');
}

function handleNewGame() {
  document.getElementById('winner-modal').classList.add('hidden');
  resetAnalysis();
  handleStop();
}

function handleViewGame() {
  document.getElementById('winner-modal').classList.add('hidden');
}

function resetAnalysis() {
  document.getElementById('analysis-section').classList.add('hidden');
  document.getElementById('analysis-loading').classList.add('hidden');
  document.getElementById('analysis-content').classList.add('hidden');
  document.getElementById('analysis-text').innerHTML = '';
  const btn = document.getElementById('analyze-btn');
  btn.classList.remove('hidden', 'opacity-50', 'cursor-not-allowed');
  btn.disabled = false;
  btn.textContent = 'Analyze Game';
  document.getElementById('view-game-btn').classList.add('hidden');
}

async function handleAnalyze() {
  const btn = document.getElementById('analyze-btn');
  const section = document.getElementById('analysis-section');
  const loading = document.getElementById('analysis-loading');
  const content = document.getElementById('analysis-content');

  btn.disabled = true;
  btn.textContent = 'Analyzing...';
  btn.classList.add('opacity-50', 'cursor-not-allowed');

  section.classList.remove('hidden');
  loading.classList.remove('hidden');
  content.classList.add('hidden');

  try {
    const resp = await fetch(`/api/game/${state.gameId}/analyze`, { method: 'POST' });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.error || 'Analysis failed');

    let text = data.analysis || '';
    text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong class="text-white font-semibold">$1</strong>');
    const paragraphs = text.split(/\n\n+/).filter(p => p.trim());
    document.getElementById('analysis-text').innerHTML = paragraphs.map(p =>
      `<p>${p.replace(/\n/g, '<br>')}</p>`
    ).join('');

    loading.classList.add('hidden');
    content.classList.remove('hidden');

    btn.classList.add('hidden');
    document.getElementById('view-game-btn').classList.remove('hidden');
  } catch (e) {
    loading.classList.add('hidden');
    section.classList.add('hidden');
    btn.disabled = false;
    btn.textContent = 'Analyze Game';
    btn.classList.remove('opacity-50', 'cursor-not-allowed');
    console.error('[Arena] Analysis failed:', e);
    // Show error inline
    section.classList.remove('hidden');
    content.classList.remove('hidden');
    document.getElementById('analysis-text').innerHTML =
      `<p class="text-red-400">${e.message}</p>`;
  }
}

// ── Screen management ────────────────────────────────────────────────────────
function showScreen(name) {
  ['setup-screen', 'loading-screen', 'game-screen'].forEach(id => {
    document.getElementById(id).classList.toggle('hidden', id !== name + '-screen');
  });
}

// ── Boot ─────────────────────────────────────────────────────────────────────
init();
</script>
