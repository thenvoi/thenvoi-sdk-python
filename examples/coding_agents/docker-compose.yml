# Multi-Agent Docker Compose: Claude SDK (planner) + Codex (reviewer, implementer)
#
# All three agents share /workspace/repo and connect to the Thenvoi platform.
# All agents read credentials from a single agent_config.yaml (keyed format).
#
# Named volumes (shared_notes, shared_state) persist after `docker compose down`.
# Use `docker compose down -v` to remove them.
#
# Usage:
#   cp .env.example .env                            # Configure credentials
#   cp agent_config.yaml.example agent_config.yaml  # Configure all agents
#   docker compose build
#   docker compose up -d
#   docker compose logs -f

x-codex: &codex-base
  restart: unless-stopped
  build:
    context: ../..
    dockerfile: docker/codex/Dockerfile
  env_file:
    - path: .env
      required: false
  environment: &codex-env-base
    CODEX_TRANSPORT: stdio
    CODEX_TURN_TASK_MARKERS: "false"
    PYTHONPATH: /workspace/repo/src
    THENVOI_REST_URL: ${THENVOI_REST_URL:-https://app.thenvoi.com}
    THENVOI_WS_URL: ${THENVOI_WS_URL:-wss://app.thenvoi.com/api/v1/socket/websocket}
    THENVOI_CLIENT_REST_WHEEL: ${THENVOI_CLIENT_REST_WHEEL:-}
    PHOENIX_CHANNELS_CLIENT_WHEEL: ${PHOENIX_CHANNELS_CLIENT_WHEEL:-}
  volumes: &codex-volumes
    - ./agent_config.yaml:/app/agent_config.yaml:ro
    - ${REPO_PATH:-.}:/workspace/repo  # rw: codex agents need write access
    - shared_notes:/workspace/notes
    - shared_state:/workspace/state
    - ${HOME}/.codex:/home/codex/.codex:ro
    - codex_sessions:/home/codex/.codex/sessions
    - ${HOME}/.config/gh:/home/codex/.config/gh:ro
    - ${HOME}/.ssh:/home/codex/.ssh:ro
    - ${HOME}/.gitconfig:/home/codex/.gitconfig:ro
    - ${THENVOI_CLIENT_REST_WHEEL_DIR:-/tmp/thenvoi-client-rest}:/opt/thenvoi-client-rest:ro
    - ${PHOENIX_CHANNELS_CLIENT_WHEEL_DIR:-/tmp/phoenix-client}:/opt/phoenix-client:ro
  extra_hosts:
    - "host.docker.internal:host-gateway"
  working_dir: /workspace/repo
  stdin_open: true
  tty: true

services:
  # ── Planner (Claude SDK) ────────────────────────────────────────────────
  planner:
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: examples/coding_agents/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      AGENT_CONFIG: /app/config/agent_config.yaml
      AGENT_KEY: planner
      AGENT_ROLE: planner
      WORKSPACE: /workspace/repo
      THENVOI_REST_URL: ${THENVOI_REST_URL:-https://app.thenvoi.com}
      THENVOI_WS_URL: ${THENVOI_WS_URL:-wss://app.thenvoi.com/api/v1/socket/websocket}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./agent_config.yaml:/app/config/agent_config.yaml:ro
      - ./prompts:/app/config/prompts:ro
      - ${REPO_PATH:-.}:/workspace/repo:ro  # planner only reads source code
      - shared_notes:/workspace/notes
      - shared_state:/workspace/state
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Reviewer (Codex) ───────────────────────────────────────────────────
  reviewer:
    <<: *codex-base
    environment:
      <<: *codex-env-base
      CODEX_CWD: /workspace/repo
      CODEX_SANDBOX: ${REVIEWER_SANDBOX:-external-sandbox}
      CODEX_AGENT_KEY: ${REVIEWER_AGENT_KEY:-reviewer}
      CODEX_APPROVAL_MODE: ${REVIEWER_APPROVAL_MODE:-manual}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command:
      - /app/.venv/bin/python
      - examples/run_agent.py
      - --example
      - codex
      - --agent
      - ${REVIEWER_AGENT_KEY:-reviewer}
      - --codex-role
      - reviewer
      - --codex-transport
      - stdio
      - --codex-model
      - ${REVIEWER_MODEL:-gpt-5.3-codex}
      - --codex-reasoning-effort
      - ${REVIEWER_REASONING_EFFORT:-xhigh}
      - --codex-cwd
      - /workspace/repo
      - --codex-sandbox
      - ${REVIEWER_SANDBOX:-external-sandbox}
      - --no-codex-turn-task-markers

  # ── Implementer (Codex) ────────────────────────────────────────────────
  implementer:
    <<: *codex-base
    environment:
      <<: *codex-env-base
      CODEX_CWD: /workspace/repo
      CODEX_SANDBOX: ${IMPLEMENTER_SANDBOX:-external-sandbox}
      CODEX_AGENT_KEY: ${IMPLEMENTER_AGENT_KEY:-implementer}
      CODEX_APPROVAL_MODE: ${IMPLEMENTER_APPROVAL_MODE:-manual}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    command:
      - /app/.venv/bin/python
      - examples/run_agent.py
      - --example
      - codex
      - --agent
      - ${IMPLEMENTER_AGENT_KEY:-implementer}
      - --codex-role
      - coding
      - --codex-transport
      - stdio
      - --codex-model
      - ${IMPLEMENTER_MODEL:-gpt-5.3-codex}
      - --codex-reasoning-effort
      - ${IMPLEMENTER_REASONING_EFFORT:-high}
      - --codex-cwd
      - /workspace/repo
      - --codex-sandbox
      - ${IMPLEMENTER_SANDBOX:-external-sandbox}
      - --no-codex-turn-task-markers

volumes:
  codex_sessions:
  shared_notes:
  shared_state:
