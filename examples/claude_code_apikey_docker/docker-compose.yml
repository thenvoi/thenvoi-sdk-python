# Build:  docker compose build
# Run:    docker compose up

x-agent: &agent-base
  build:
    context: ../..
    dockerfile: examples/claude_code_apikey_docker/Dockerfile
  image: thenvoi-claude-sdk:latest
  env_file: .env
  volumes:
    - ./:/app/config:ro
  restart: unless-stopped
  healthcheck:
    test: ["CMD", "python", "-c", "import thenvoi; from thenvoi.adapters import ClaudeSDKAdapter"]
    interval: 30s
    timeout: 10s
    retries: 3
    start_period: 10s

services:
  agent1:
    <<: *agent-base
    container_name: thenvoi-agent1
    environment:
      AGENT_CONFIG: /app/config/agent1.yaml

