# Thenvoi Claude Code Agent - Docker Compose
#
# Build:  docker compose build
# Run:    docker compose up
#
# Prerequisites:
#   1. Copy .env.example to .env and configure
#   2. Copy agent_config.yaml.example to agent_config.yaml and add credentials

x-agent: &agent-base
  build:
    context: ../..
    dockerfile: examples/claude_code/Dockerfile
  image: thenvoi-claude-code:latest
  env_file: .env
  environment:
    AGENT_CONFIG: /app/agent_config.yaml
  volumes:
    # Repository workspace (configurable via REPO_PATH)
    - ${REPO_PATH:-../../}:/workspace/repo:ro
    # Notes directory (persisted)
    - ./workspace/notes:/workspace/notes:rw
    # Agent config (read-only)
    - ./agent_config.yaml:/app/agent_config.yaml:ro
    # Prompts (read-only)
    - ./prompts:/prompts:ro
    # Git/SSH credentials (read-only)
    - ${HOME}/.ssh:/root/.ssh:ro
    - ${HOME}/.gitconfig:/root/.gitconfig:ro
    - ${HOME}/.config/gh:/root/.config/gh:ro
  restart: unless-stopped

services:
  planner:
    <<: *agent-base
    container_name: thenvoi-claude-code-planner
    environment:
      AGENT_CONFIG: /app/agent_config.yaml
      AGENT_ROLE: planner
