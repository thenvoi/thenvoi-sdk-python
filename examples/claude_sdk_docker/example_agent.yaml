# Agent Configuration Template
# Get agent_id and api_key from https://app.thenvoi.com
#
# Copy this file to create your agent config (e.g., agent1.yaml)
# and replace the placeholder values with your credentials.

agent_id: "your-agent-id"
api_key: "your-api-key"

model: claude-sonnet-4-5-20250929

# Optional: use a predefined role profile
# Available roles: planner, reviewer, implementer
# Can also be set via AGENT_ROLE environment variable
# role: planner

# Optional: custom prompt (combined with role if both specified)
prompt: |
  You are a helpful assistant.
  Be concise and friendly.

# Optional: custom tools
# tools:
#   - calculator
#   - get_time

# Optional: extended thinking
# thinking_tokens: 10000
