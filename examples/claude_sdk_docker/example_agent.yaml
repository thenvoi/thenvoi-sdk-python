# Agent Configuration Template
# Get agent_id and api_key from https://app.thenvoi.com
#
# Copy this file to create your agent config (e.g., agent1.yaml)
# and replace the placeholder values with your credentials.

agent_id: "your-agent-id"
api_key: "your-api-key"

# Optional model override.  Omit to let the npm `claude` binary pick its own
# default.  Aliases (`sonnet` / `opus` / `haiku`) resolve to the latest of
# that family on the installed binary, so they don't go stale.
# model: opus
# fallback_model: sonnet

# Optional: use a predefined role profile
# Available roles: planner, reviewer
# Can also be set via AGENT_ROLE environment variable
# role: planner

# Optional: custom prompt (combined with role if both specified)
prompt: |
  You are a helpful assistant.
  Be concise and friendly.

# Optional: custom tools
# tools:
#   - calculator
#   - get_time

# Optional: working directory for the agent (default: /workspace/repo)
# Can also be set via WORKSPACE environment variable
# workspace: /workspace/repo

# Optional: extended thinking
# thinking_tokens: 10000
