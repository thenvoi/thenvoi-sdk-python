services:
  bridge:
    build:
      context: ..
      dockerfile: thenvoi-bridge/Dockerfile
    env_file: .env
    # REQUIRED: uncomment and set `command` to your entry point that
    # registers handlers.  Without this, the container exits immediately
    # with a usage message.
    # command: ["python", "run.py"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    restart: unless-stopped
