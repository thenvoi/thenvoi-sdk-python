services:
  bridge:
    build:
      context: ..
      dockerfile: thenvoi-bridge/Dockerfile
    env_file: .env
    # Override CMD to point to your entry point that registers handlers.
    # Example: command: ["python", "run.py"]
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
