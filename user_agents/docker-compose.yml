# Run all agents: docker compose up -d
# Run specific:   docker compose up agent1 agent2 -d
# Stop all:       docker compose down

x-agent: &agent-base
  image: ghcr.io/thenvoi/thenvoi-claude-sdk:latest
  env_file: .env
  volumes:
    - ./:/app/user_agents:ro
  restart: unless-stopped

services:
  agent1:
    <<: *agent-base
    environment:
      AGENT_CONFIG: /app/user_agents/agent1.yaml

  agent2:
    <<: *agent-base
    environment:
      AGENT_CONFIG: /app/user_agents/agent2.yaml

  # agent3:
  #   <<: *agent-base
  #   environment:
  #     AGENT_CONFIG: /app/user_agents/agent3.yaml
