# Thenvoi Agent Runner - Docker Compose Configuration
#
# Build:  docker compose build
# Run:    docker compose up
#
# Each agent is configured via a YAML file in the agents/ directory.
# To add a new agent:
#   1. Create agents/your-agent.yaml with agent_id, api_key, model, prompt
#   2. Add a new service below pointing to that config file
#   3. Run: docker compose up your-agent

x-agent: &agent-base
  build:
    context: .
    dockerfile: Dockerfile
  image: thenvoi-agent:latest
  env_file: .env
  volumes:
    - ./agents:/app/config:ro
  restart: unless-stopped
  stop_grace_period: 30s
  healthcheck:
    test: ["CMD", "uv", "run", "--extra", "claude_sdk", "python", "healthcheck.py"]
    interval: 30s
    timeout: 15s
    retries: 3
    start_period: 30s

services:
  # Example agent - uses agents/agent1.yaml
  agent1:
    <<: *agent-base
    container_name: thenvoi-agent1
    environment:
      AGENT_CONFIG: /app/config/agent1.yaml

